name: Android Build

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build signed release APK + AAB
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install dependencies
        run: npm install

      - name: Align Expo dependency versions
        run: npx expo install --fix
        continue-on-error: true

      - name: Expo Doctor
        run: npx expo-doctor
        continue-on-error: true

      - name: Check Expo dependencies
        run: npx expo install --check
        continue-on-error: true

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK Platform 35 and Build Tools 35.0.0
        run: |
          yes | sdkmanager "platforms;android-35" "build-tools;35.0.0" "platform-tools"

      - name: Expo prebuild (Android)
        run: npx expo prebuild --platform android --no-install --clean

      - name: Decode release keystore
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/hydrotiles-release-key.p12

      - name: Configure release signing
        run: |
          python3 - <<'PY'
          import io, sys, re
          path = "android/app/build.gradle"
          s = io.open(path, encoding="utf-8").read()

          release_cfg = (
              "        release {\n"
              "            storeFile file(System.getenv(\"HYDROTILES_STORE_FILE\") ?: \"hydrotiles-release-key.p12\")\n"
              "            storePassword System.getenv(\"HYDROTILES_STORE_PASSWORD\")\n"
              "            keyAlias System.getenv(\"HYDROTILES_KEY_ALIAS\")\n"
              "            keyPassword System.getenv(\"HYDROTILES_KEY_PASSWORD\")\n"
              "            storeType \"PKCS12\"\n"
              "        }\n"
          )

          # 1) Add a release signingConfig into the existing signingConfigs { ... } block.
          if "release {" not in s.split("buildTypes", 1)[0]:
              idx = s.find("signingConfigs {")
              if idx == -1:
                  print("ERROR: signingConfigs block not found", file=sys.stderr); sys.exit(1)
              insert_at = s.index("\n", idx) + 1
              s = s[:insert_at] + release_cfg + s[insert_at:]

          # 2) Point every buildType that used the debug signing config at the release one.
          before = s
          s = s.replace("signingConfig signingConfigs.debug", "signingConfig signingConfigs.release")
          if s == before:
              print("WARNING: no 'signingConfig signingConfigs.debug' line was replaced", file=sys.stderr)

          io.open(path, "w", encoding="utf-8").write(s)
          print("---- signing section of build.gradle ----")
          m = re.search(r"signingConfigs \{.*?buildTypes \{.*?\n    \}", s, re.S)
          print(m.group(0) if m else s)
          PY

      - name: Build release APK
        working-directory: android
        env:
          HYDROTILES_STORE_FILE: hydrotiles-release-key.p12
          HYDROTILES_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          HYDROTILES_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          HYDROTILES_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:assembleRelease --no-daemon

      - name: Build release AAB
        working-directory: android
        env:
          HYDROTILES_STORE_FILE: hydrotiles-release-key.p12
          HYDROTILES_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          HYDROTILES_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          HYDROTILES_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: ./gradlew :app:bundleRelease --no-daemon

      - name: Verify release signing (fail if debug-signed)
        run: |
          set -e
          APKSIGNER="$(ls "$ANDROID_HOME"/build-tools/35.0.0/apksigner 2>/dev/null || true)"
          if [ -z "$APKSIGNER" ]; then
            APKSIGNER="$(find "$ANDROID_HOME"/build-tools -name apksigner | sort | tail -n1)"
          fi
          APK="$(ls android/app/build/outputs/apk/release/*.apk | head -n1)"
          echo "Using apksigner: $APKSIGNER"
          echo "Verifying: $APK"
          "$APKSIGNER" verify --print-certs "$APK" | tee signer-certs.txt
          if grep -qi "CN=Android Debug" signer-certs.txt; then
            echo "::error::APK is signed with the Android DEBUG key. Play Store will reject it."
            exit 1
          fi
          echo "Release signing verified: not a debug key."

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydrotiles-release-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: hydrotiles-release-aab
          path: android/app/build/outputs/bundle/release/*.aab
          if-no-files-found: error
