// android-signing.gradle
// Applied by CI into the Expo-generated android/app/build.gradle to enable
// signed release builds using values passed through gradle.properties.
//
// Expected gradle.properties (or -P flags / environment) keys:
//   HYDROTILES_UPLOAD_STORE_FILE     (path to .p12/keystore, relative to android/app)
//   HYDROTILES_UPLOAD_STORE_PASSWORD
//   HYDROTILES_UPLOAD_KEY_ALIAS
//   HYDROTILES_UPLOAD_KEY_PASSWORD
//
// This file is applied at the end of android/app/build.gradle by the CI patch
// step: `apply from: "../../android-signing.gradle"`.

android {
    signingConfigs {
        release {
            if (project.hasProperty('HYDROTILES_UPLOAD_STORE_FILE')) {
                storeFile file(HYDROTILES_UPLOAD_STORE_FILE)
                storePassword HYDROTILES_UPLOAD_STORE_PASSWORD
                keyAlias HYDROTILES_UPLOAD_KEY_ALIAS
                keyPassword HYDROTILES_UPLOAD_KEY_PASSWORD
                storeType "PKCS12"
            }
        }
    }
    buildTypes {
        release {
            if (project.hasProperty('HYDROTILES_UPLOAD_STORE_FILE')) {
                signingConfig signingConfigs.release
            }
        }
    }
}
